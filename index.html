  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Oswald';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"192b432b-bd48-4252-8d00-2420113ee19d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n*{box-sizing:border-box}\nbody{margin:0;background:#E9E5DF;font-family:'DM Sans',Arial,system-ui,sans-serif;color:#1F1B26;-webkit-font-smoothing:antialiased}\nbutton{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}\nul{margin:0;padding:0;list-style:none}\n@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}\n.fade{animation:fadeUp .38s cubic-bezier(.22,1,.36,1) both}\n@media(max-width:900px){.shell{flex-direction:column !important}.rail{display:none !important}}\n@media(max-width:620px){.content{padding:24px 18px 34px !important}.hide-sm{display:none !important}.cover-pad{padding:30px 22px 34px !important}.grid2{grid-template-columns:1fr !important}}\n<\u002Fstyle>\n<script src=\"333c2b99-6071-429d-94be-ae1837025b40\"><\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;display:flex;flex-direction:column\">\n\n  <!-- ===== TOP BAR ===== -->\n  <div style=\"background:#16161D;color:#fff;position:sticky;top:0;z-index:30\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px\">\n      <div style=\"display:flex;align-items:center;gap:14px;min-width:0\">\n        <div style=\"flex:none;background:#fff;border-radius:8px;padding:7px 10px;display:flex\"><img src=\"15eab32c-6e21-4bd7-8c98-66dd49364f7a\" alt=\"Launch Housing\" style=\"height:24px;width:auto;display:block\"><\u002Fdiv>\n        <div style=\"min-width:0\">\n          <div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:0.04em;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">FLEET CAR USAGE &amp; MAINTENANCE<\u002Fdiv>\n          <div class=\"hide-sm\" style=\"font-size:11px;color:#9C988F;letter-spacing:0.08em;text-transform:uppercase;margin-top:2px\">Before · During · After every trip<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px\">\n        <span style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;color:#F58220;letter-spacing:0.06em;white-space:nowrap\">{{ progressLabel }}<\u002Fspan>\n        <div class=\"hide-sm\" style=\"width:150px;height:8px;border-radius:4px;background:#2C2C36;position:relative;overflow:hidden\">\n          <div style=\"{{ progressFillStyle }}\"><\u002Fdiv>\n          <div style=\"position:absolute;top:50%;left:0;right:0;height:2px;transform:translateY(-50%);background:repeating-linear-gradient(90deg,#5A5A66 0 9px,transparent 9px 18px)\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== SHELL ===== -->\n  <div class=\"shell\" style=\"flex:1;display:flex;max-width:1180px;margin:0 auto;width:100%\">\n\n    <!-- ROUTE RAIL -->\n    <aside class=\"rail\" style=\"flex:none;width:248px;padding:30px 18px 30px 22px\">\n      <div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#9A938A;margin:0 0 16px 8px\">Your route<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:3px\">\n        <sc-for list=\"{{ routeItems }}\" as=\"r\" hint-placeholder-count=\"9\">\n          <button type=\"button\" onclick=\"{{ r.onClick }}\" style=\"{{ r.style }}\">\n            <span style=\"{{ r.dotStyle }}\">{{ r.dotLabel }}<\u002Fspan>\n            <span style=\"{{ r.nameStyle }}\">{{ r.name }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <!-- CONTENT -->\n    <main class=\"content\" style=\"flex:1;min-width:0;padding:34px 40px 60px\">\n\n      <!-- ====================== STEP 0 · COVER ====================== -->\n      <sc-if value=\"{{ show0 }}\" hint-placeholder-val=\"{{ true }}\">\n        <div class=\"fade\" data-screen-label=\"Cover\" style=\"max-width:840px;margin:0 auto\">\n          <div style=\"background:#16161D;border-radius:20px;overflow:hidden;box-shadow:0 30px 60px -34px rgba(22,22,29,0.6)\">\n            <div style=\"height:14px;background:repeating-linear-gradient(45deg,#F58220 0 16px,#16161D 16px 32px)\"><\u002Fdiv>\n            <div class=\"cover-pad\" style=\"padding:44px 48px 48px;color:#fff\">\n              <span style=\"display:inline-block;font-family:'Oswald',sans-serif;font-weight:500;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#F58220\">Launch Housing · Fleet Safety · Module 2<\u002Fspan>\n              <h1 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:52px;line-height:0.98;text-transform:uppercase;letter-spacing:0.005em;margin:18px 0 0\">Using &amp; caring<br>for the car<\u002Fh1>\n              <p style=\"font-size:18px;line-height:1.6;color:#C9C6BE;margin:18px 0 0;max-width:580px\">Everything you need to use a fleet vehicle well — booking, checks, fuel, parking and upkeep — learnt by working through real situations, not policy text.<\u002Fp>\n\n              <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin:26px 0 0\">\n                <span style=\"display:inline-flex;align-items:center;gap:8px;background:#23232C;border:1px solid #34343F;border-radius:999px;padding:8px 15px;font-size:13.5px;font-weight:600\"><span style=\"width:8px;height:8px;border-radius:50%;background:#86C555\"><\u002Fspan>Check before you drive<\u002Fspan>\n                <span style=\"display:inline-flex;align-items:center;gap:8px;background:#23232C;border:1px solid #34343F;border-radius:999px;padding:8px 15px;font-size:13.5px;font-weight:600\"><span style=\"width:8px;height:8px;border-radius:50%;background:#F58220\"><\u002Fspan>Report every issue<\u002Fspan>\n                <span style=\"display:inline-flex;align-items:center;gap:8px;background:#23232C;border:1px solid #34343F;border-radius:999px;padding:8px 15px;font-size:13.5px;font-weight:600\"><span style=\"width:8px;height:8px;border-radius:50%;background:#44C7F4\"><\u002Fspan>Leave it ready for the next driver<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border:1px solid #E6DECB;border-radius:18px;padding:30px 32px;margin-top:18px\">\n            <h2 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:#8A8478;margin:0 0 16px\">By the end you'll be able to<\u002Fh2>\n            <ul class=\"grid2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:13px 26px\">\n              <sc-for list=\"{{ outcomes }}\" as=\"o\" hint-placeholder-count=\"6\">\n                <li style=\"display:flex;gap:11px;align-items:flex-start;font-size:15.5px;line-height:1.5;color:#3A3742\">\n                  <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\" style=\"flex:none;margin-top:1px\"><circle cx=\"10\" cy=\"10\" r=\"10\" fill=\"#F58220\"><\u002Fcircle><path d=\"M5.5 10.2l2.8 2.8 6-6.2\" stroke=\"#16161D\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                  <span>{{ o }}<\u002Fspan>\n                <\u002Fli>\n              <\u002Fsc-for>\n            <\u002Ful>\n            <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:18px;margin-top:28px\">\n              <button type=\"button\" onclick=\"{{ begin }}\" style=\"display:inline-flex;align-items:center;gap:11px;background:#F58220;color:#16161D;border-radius:11px;padding:15px 28px;font-family:'Oswald',sans-serif;font-weight:600;font-size:16px;letter-spacing:0.04em;text-transform:uppercase;box-shadow:0 12px 24px -12px rgba(245,130,32,0.7)\">Begin the module\n                <svg width=\"17\" height=\"17\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8h10M9 4l4 4-4 4\" stroke=\"#16161D\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n              <span style=\"font-size:13.5px;color:#8A8478\">9 sections · about 15 minutes · your progress is saved<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ====================== STEP 1 · INTRODUCTION (gut-check MCQ) ====================== -->\n      <sc-if value=\"{{ show1 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"fade\" data-screen-label=\"01 Introduction\" style=\"max-width:720px;margin:0 auto\">\n          <div style=\"{{ secHeadStyle }}\">\n            <span style=\"{{ secNumStyle }}\">{{ secNum }}<\u002Fspan>\n            <div>\n              <div style=\"{{ secKickerStyle }}\">Introduction<\u002Fdiv>\n              <h2 style=\"{{ secTitleStyle }}\">A safe trip starts before the engine<\u002Fh2>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"border:1.5px solid #E6DECB;border-radius:14px;overflow:hidden;background:#fff;margin-bottom:26px\">\n            <div style=\"height:10px;background:repeating-linear-gradient(45deg,#F58220 0 14px,#16161D 14px 28px)\"><\u002Fdiv>\n            <div style=\"padding:22px 24px\">\n              <div style=\"display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;letter-spacing:0.06em;color:#8A8478;text-transform:uppercase;margin-bottom:13px\">\n                <span><strong style=\"color:#16161D\">Time<\u002Fstrong> 09:05<\u002Fspan>\n                <span><strong style=\"color:#16161D\">Trip<\u002Fstrong> Client appointment<\u002Fspan>\n                <span><strong style=\"color:#16161D\">Status<\u002Fstrong> <span style=\"color:#DC382C;font-weight:700\">Running late<\u002Fspan><\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"margin:0;font-size:17px;line-height:1.62;color:#2D2D33\">You grab a set of fleet keys to get to a client appointment. You're already a few minutes behind, the car park is busy, and the car looked fine when someone used it yesterday.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"{{ decisionTagStyle }}\">\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M8 1.5 15 14H1z\" fill=\"#16161D\"><\u002Fpath><rect x=\"7\" y=\"6\" width=\"2\" height=\"4\" rx=\"1\" fill=\"#F58220\"><\u002Frect><circle cx=\"8\" cy=\"11.6\" r=\"1.1\" fill=\"#F58220\"><\u002Fcircle><\u002Fsvg>\n            Gut-check\n          <\u002Fdiv>\n          <h3 style=\"{{ qStyle }}\">Before you turn the key, what matters most?<\u002Fh3>\n\n          <div style=\"display:flex;flex-direction:column;gap:11px\">\n            <sc-for list=\"{{ s1opts }}\" as=\"o\" hint-placeholder-count=\"4\">\n              <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">\n                <span style=\"{{ o.badgeStyle }}\">{{ o.letter }}<\u002Fspan>\n                <span style=\"{{ o.labelStyle }}\">{{ o.label }}<\u002Fspan>\n                <span style=\"{{ o.markStyle }}\">{{ o.mark }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ s1fb }}\" hint-placeholder-val=\"{{ false }}\">\n            <div class=\"fade\" style=\"{{ s1fb.panelStyle }}\">\n              <p style=\"{{ s1fb.titleStyle }}\">{{ s1fb.title }}<\u002Fp>\n              <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#2D2D33\">A two-minute walk-around and a booking in Outlook protect you, the next driver and everyone on the road. The booking is also how Launch identifies the driver if there's ever a fine, infringement or incident — so it's never just paperwork.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ====================== STEP 2 · BEFORE YOU DRIVE (multi-select checklist) ====================== -->\n      <sc-if value=\"{{ show2 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"fade\" data-screen-label=\"02 Before you drive\" style=\"max-width:720px;margin:0 auto\">\n          <div style=\"{{ secHeadStyle }}\"><span style=\"{{ secNumStyle }}\">{{ secNum }}<\u002Fspan><div><div style=\"{{ secKickerStyle }}\">Before you drive · vehicle inspection<\u002Fdiv><h2 style=\"{{ secTitleStyle }}\">Walk around the car<\u002Fh2><\u002Fdiv><\u002Fdiv>\n          <p style=\"font-size:16.5px;line-height:1.6;color:#3A3742;margin:0 0 22px\">Get yourself set up and check the car over. Tap every item that's part of the <strong>pre-drive routine<\u002Fstrong> — and leave the jobs that aren't yours to do before a trip.<\u002Fp>\n          <div class=\"grid2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:11px\">\n            <sc-for list=\"{{ s2items }}\" as=\"o\" hint-placeholder-count=\"12\">\n              <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">\n                <span style=\"{{ o.boxStyle }}\">{{ o.mark }}<\u002Fspan>\n                <span style=\"flex:1;font:500 15.5px/1.3 'DM Sans',Arial,sans-serif\">{{ o.label }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ s2result }}\" hint-placeholder-val=\"{{ false }}\">\n            <div class=\"fade\" style=\"{{ s2result.panelStyle }}\">\n              <p style=\"{{ s2result.titleStyle }}\">{{ s2result.title }}<\u002Fp>\n              <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#2D2D33\">{{ s2result.body }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex;gap:12px;margin-top:22px\">\n            <sc-if value=\"{{ s2submitted }}\" hint-placeholder-val=\"{{ false }}\">\n              <button type=\"button\" onclick=\"{{ s2reset }}\" style=\"display:inline-flex;align-items:center;gap:8px;border:1.5px solid #C9C0B0;border-radius:10px;padding:12px 22px;font-weight:600;font-size:14px;color:#6B655C;background:#fff\">Try again<\u002Fbutton>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ s2showSubmit }}\" hint-placeholder-val=\"{{ true }}\">\n              <button type=\"button\" onclick=\"{{ s2submit }}\" style=\"{{ s2submitStyle }}\">Check my walk-around\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8.5l3.5 3.5L13 4.5\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ====================== STEP 3 · LOOKING AFTER THE CAR (multi-scene scenarios) ====================== -->\n      <sc-if value=\"{{ show3 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"fade\" data-screen-label=\"03 Looking after the car\" style=\"max-width:720px;margin:0 auto\">\n          <div style=\"{{ secHeadStyle }}\">\n            <span style=\"{{ secNumStyle }}\">{{ secNum }}<\u002Fspan>\n            <div>\n              <div style=\"{{ secKickerStyle }}\">What would you do? · Daily care<\u002Fdiv>\n              <h2 style=\"{{ secTitleStyle }}\">Looking after the car<\u002Fh2>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px\">\n            <span style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#8A8478;white-space:nowrap\">{{ s3sceneNo }}<\u002Fspan>\n            <div style=\"flex:1;height:6px;border-radius:3px;backgrou fb.email }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:16px;display:flex;align-items:center;gap:14px;background:#fff;border:1.5px solid #E6DECB;border-left:5px solid #1F8A8A;border-radius:11px;padding:14px 18px\">\n                  <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none\"><rect x=\"2\" y=\"5\" width=\"20\" height=\"14\" rx=\"2.5\" fill=\"#1F8A8A\"><\u002Frect><path d=\"M3 7l9 6 9-6\" stroke=\"#fff\" stroke-width=\"1.8\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n                  <div><div style=\"font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:#8A8478;font-weight:600\">{{ s3fb.email.label }}<\u002Fdiv><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;letter-spacing:0.01em;color:#16161D;word-break:break-word\">{{ s3fb.email.value }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ s3showNext }}\" hint-placeholder-val=\"{{ false }}\">\n                <button type=\"button\" onclick=\"{{ nextScene }}\" style=\"margin-top:18px;display:inline-flex;align-items:center;gap:9px;background:#16161D;color:#fff;border-radius:9px;padding:12px 20px;font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.05em;text-transform:uppercase\">{{ s3nextLabel }}\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8h10M9 4l4 4-4 4\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ====================== STEP 4 · WARNING LIGHTS & UPKEEP (branching steps) ====================== -->\n      <sc-if value=\"{{ show4 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"fade\" data-screen-label=\"04 Warning lights\" style=\"max-width:720px;margin:0 auto\">\n          <div style=\"{{ secHeadStyle }}\"><span style=\"{{ secNumStyle }}\">{{ secNum }}<\u002Fspan><div><div style=\"{{ secKickerStyle }}\">Warning lights &amp; upkeep<\u002Fdiv><h2 style=\"{{ secTitleStyle }}\">When the dash lights up<\u002Fh2><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px\">\n            <span style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#8A8478;white-space:nowrap\">{{ s4no }}<\u002Fspan>\n            <div style=\"flex:1;height:6px;border-radius:3px;background:#E6DECB;position:relative;overflow:hidden\"><div style=\"{{ s4fill }}\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#16161D;color:#fff;border-radius:14px;padding:20px 22px;margin-bottom:22px\">\n            <div style=\"font-family:'Oswald',sans-serif;font-weight:500;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#F58220;margin-bottom:8px\">{{ s4tag }}<\u002Fdiv>\n            <p style=\"margin:0;font-size:17px;line-height:1.6\">{{ s4scenario }}<\u002Fp>\n          <\u002Fdiv>\n          <h3 style=\"{{ qStyle }}\">{{ s4q }}<\u002Fh3>\n          <div style=\"display:flex;flex-direction:column;gap:11px\">\n            <sc-for list=\"{{ s4opts }}\" as=\"o\" hint-placeholder-count=\"4\">\n              <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\"><span style=\"{{ o.badgeStyle }}\">{{ o.letter }}<\u002Fspan><span style=\"{{ o.labelStyle }}\">{{ o.label }}<\u002Fspan><span style=\"{{ o.markStyle }}\">{{ o.mark }}<\u002Fspan><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ s4fb }}\" hint-placeholder-val=\"{{ false }}\">\n            <div class=\"fade\" style=\"{{ s4fb.panelStyle }}\">\n              <p style=\"{{ s4fb.titleStyle }}\">{{ s4fb.title }}<\u002Fp>\n              <ul style=\"display:flex;flex-direction:column;gap:9px\">\n                <sc-for list=\"{{ s4fb.points }}\" as=\"p\" hint-placeholder-count=\"2\">\n                  <li style=\"display:flex;gap:10px;align-items:flex-start;font-size:15.5px;line-height:1.55;color:#2D2D33\"><span style=\"flex:none;margin-top:8px;width:6px;height:6px;border-radius:50%;background:#16161D\"><\u002Fspan><span>{{ p }}<\u002Fspan><\u002Fli>\n                <\u002Fsc-for>\n              <\u002Ful>\n              <sc-if value=\"{{ s4fb.number }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:16px;display:flex;align-items:center;gap:14px;background:#fff;border:1.5px solid #E6DECB;border-left:5px solid #F58220;border-radius:11px;padding:14px 18px\">\n                  <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none\"><path d=\"M3 4h3l2 5-2.5 1.5a11 11 0 0 0 5 5L16 13l5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 1 6a2 2 0 0 1 2-2z\" fill=\"#F58220\"><\u002Fpath><\u002Fsvg>\n                  <div><div style=\"font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:#8A8478;font-weight:600\">{{ s4fb.number.label }}<\u002Fdiv><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:24px;letter-spacing:0.03em;color:#16161D\">{{ s4fb.number.value }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ s4fb.email }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:16px;display:flex;align-items:center;gap:14px;background:#fff;border:1.5px solid #E6DECB;border-left:5px solid #1F8A8A;border-radius:11px;padding:14px 18px\">\n                  <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none\"><rect x=\"2\" y=\"5\" width=\"20\" height=\"14\" rx=\"2.5\" fill=\"#1F8A8A\"><\u002Frect><path d=\"M3 7l9 6 9-6\" stroke=\"#fff\" stroke-width=\"1.8\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n                  <div><div style=\"font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:#8A8478;font-weight:600\">{{ s4fb.email.label }}<\u002Fdiv><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;letter-spacing:0.01em;color:#16161D;word-break:break-word\">{{ s4fb.email.value }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ s4showNext }}\" hint-placeholder-val=\"{{ false }}\">\n                <button type=\"button\" onclick=\"{{ s4nextStep }}\" style=\"margin-top:18px;display:inline-flex;align-items:center;gap:9px;background:#16161D;color:#fff;border-radius:9px;padding:12px 20px;font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.05em;text-transform:uppercase\">Next situation\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8h10M9 4l4 4-4 4\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ====================== STEP 5 · FUEL, TOLLS & USE (MCQ + accordion) ====================== -->\n      <sc-if value=\"{{ show5 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"fade\" data-screen-label=\"05 Fuel, tolls &amp; use\" style=\"max-width:720px;margin:0 auto\">\n          <div style=\"{{ secHeadStyle }}\"><span style=\"{{ secNumStyle }}\">{{ secNum }}<\u002Fspan><div><div style=\"{{ secKickerStyle }}\">Fuel, tolls &amp; vehicle use<\u002Fdiv><h2 style=\"{{ secTitleStyle }}\">Using the car the right way<\u002Fh2><\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#16161D;color:#fff;border-radius:14px;padding:20px 22px;margin-bottom:22px\">\n            <div style=\"font-family:'Oswald',sans-serif;font-weight:500;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#F58220;margin-bottom:8px\">Running between appointments<\u002Fdiv>\n            <p style=\"margin:0;font-size:17px;line-height:1.6\">{{ s5scenario }}<\u002Fp>\n          <\u002Fdiv>\n          <h3 style=\"{{ qStyle }}\">{{ s5q }}<\u002Fh3>\n          <div style=\"display:flex;flex-direction:column;gap:11px\">\n            <sc-for list=\"{{ s5opts }}\" as=\"o\" hint-placeholder-count=\"4\">\n              <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\"><span style=\"{{ o.badgeStyle }}\">{{ o.letter }}<\u002Fspan><span style=\"{{ o.labelStyle }}\">{{ o.label }}<\u002Fspan><span style=\"{{ o.markStyle }}\">{{ o.mark }}<\u002Fspan><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ s5fb }}\" hint-placeholder-val=\"{{ false }}\">\n            <div class=\"fade\" style=\"{{ s5fb.panelStyle }}\">\n              <p style=\"{{ s5fb.titleStyle }}\">{{ s5fb.title }}<\u002Fp>\n              <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#2D2D33\">Fuel below ½ gets filled, work tolls are covered, and the booking must always show who's actually driving. The car is for work — personal errands and overnight garaging have their own rules. Here's how the <strong>fuel card<\u002Fstrong> works:<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ s5answered }}\" hint-placeholder-val=\"{{ false }}\">\n            <div class=\"fade\" style=\"margin-top:22px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px\">\n                <div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#8A8478\">Using the fuel card<\u002Fdiv>\n                <span style=\"{{ s5counterStyle }}\">{{ s5counterText }}<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"font-size:13.5px;line-height:1.5;color:#8A8478;margin:0 0 12px\">Open each step to review it. You'll need to review all {{ s5total }} to continue.<\u002Fp>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <sc-for list=\"{{ s5accordion }}\" as=\"a\" hint-placeholder-count=\"6\">\n                  <div style=\"border:1px solid #E6DECB;border-radius:11px;overflow:hidden;background:#fff\">\n                    <button type=\"button\" onclick=\"{{ a.onClick }}\" style=\"{{ a.headStyle }}\">\n                      <span style=\"display:flex;align-items:center;gap:11px\"><span style=\"{{ a.tickStyle }}\">{{ a.tick }}<\u002Fspan><span>{{ a.h }}<\u002Fspan><\u002Fspan>\n                      <span style=\"{{ a.signStyle }}\">{{ a.sign }}<\u002Fspan>\n                    <\u002Fbutton>\n                    <div style=\"{{ a.bodyWrapStyle }}\"><div style=\"{{ a.bodyStyle }}\">{{ a.b }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ====================== STEP 6 · PARKING & SECURITY (conversation) ====================== -->\n      <sc-if value=\"{{ show6 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"fade\" data-screen-label=\"06 Parking &amp; security\" style=\"max-width:720px;margin:0 auto\">\n          <div style=\"{{ secHeadStyle }}\"><span style=\"{{ secNumStyle }}\">{{ secNum }}<\u002Fspan><div><div style=\"{{ secKickerStyle }}\">Parking &amp; security<\u002Fdiv><h2 style=\"{{ secTitleStyle }}\">A quick word before you go<\u002Fh2><\u002Fdiv><\u002Fdiv>\n          <p style=\"font-size:16.5px;line-height:1.6;color:#3A3742;margin:0 0 18px\">You're heading out to a client visit. Your team leader catches you on the way to the car. Tap through the conversation.<\u002Fp>\n          <div style=\"background:#F1EDE6;border:1px solid #E6DECB;border-radius:18px;padding:20px 20px 22px\">\n            <div style=\"display:flex;align-items:center;gap:11px;padding-bottom:14px;border-bottom:1px solid #E0D8CC;margin-bottom:16px\">\n              <span style=\"flex:none;width:38px;height:38px;border-radius:50%;background:#F58220;color:#16161D;display:grid;place-items:center;font-family:'Oswald',sans-serif;font-weight:600;font-size:16px\">J<\u002Fspan>\n              <div><div style=\"font-weight:700;font-size:15px;color:#16161D\">Jordan<\u002Fdiv><div style=\"font-size:12.5px;color:#8A8478\">Your team leader<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ s6msgs }}\" as=\"m\" hint-placeholder-count=\"1\">\n              <div style=\"{{ m.rowStyle }}\"><div style=\"{{ m.bubbleStyle }}\">{{ m.text }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ s6showMgr }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;justify-content:flex-start;margin-top:4px\">\n                <button type=\"button\" onclick=\"{{ s6onContinue }}\" style=\"display:inline-flex;align-items:center;gap:8px;background:#16161D;color:#fff;border-radius:999px;padding:10px 18px;font-size:13.5px;font-weight:600\">Continue\n                  <svg width=\"14\" height=\"14\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8h10M9 4l4 4-4 4\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ s6showYou }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-end;margin-top:6px\">\n                <sc-for list=\"{{ s6choices }}\" as=\"c\" hint-placeholder-count=\"2\">\n                  <button type=\"button\" onclick=\"{{ c.onClick }}\" style=\"background:#fff;border:1.5px solid #F58220;color:#16161D;border-radius:999px;padding:10px 18px;font-size:14px;font-weight:600\" style-hover=\"background:#FFF4E9\">{{ c.label }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ s6done }}\" hint-placeholder-val=\"{{ false }}\">\n              <div class=\"fade\" style=\"margin-top:18px;display:flex;gap:13px;align-items:flex-start;background:#fff;border:1px solid #CDE6E6;border-left:5px solid #1F8A8A;border-radius:13px;padding:16px 18px\">\n                <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none\"><path d=\"M12 2 4 6v6c0 5 3.4 8.5 8 10 4.6-1.5 8-5 8-10V6z\" fill=\"#1F8A8A\"><\u002Fpath><path d=\"M8.5 12l2.2 2.2 4.8-5\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                <p style=\"margin:0;font-size:15px;line-height:1.55;color:#2D2D33\"><strong style=\"color:#16161D\">Park to leave easily, keep clients out of the car, and lock valuables away.<\u002Fstrong> If a vehicle is ever broken into or goes missing, log a Damstra report and email the Fleet Team as soon as you can.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ====================== STEP 7 · QUICK FIRE (flip cards) ====================== -->\n      <sc-if value=\"{{ show7 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"fade\" data-screen-label=\"07 Quick-fire\" style=\"max-width:720px;margin:0 auto\">\n          <div style=\"{{ secHeadStyle }}\"><span style=\"{{ secNumStyle }}\">{{ secNum }}<\u002Fspan><div><div style=\"{{ secKickerStyle }}\">Quick-fire challenges<\u002Fdiv><h2 style=\"{{ secTitleStyle }}\">Think on your feet<\u002Fh2><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px\">\n            <p style=\"font-size:16px;line-height:1.55;color:#3A3742;margin:0\">Six fast situations. Reveal every card to continue.<\u002Fp>\n            <span style=\"{{ s7counterStyle }}\">{{ s7counterText }}<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:13.5px;line-height:1.5;color:#8A8478;margin:0 0 18px\">Tap a card to flip it. Once revealed, a card stays counted — your progress never goes backwards.<\u002Fp>\n          <div class=\"grid2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:13px\">\n            <sc-for list=\"{{ s7cards }}\" as=\"c\" hint-placeholder-count=\"6\">\n              <button type=\"button\" onclick=\"{{ c.onClick }}\" style=\"{{ c.cardStyle }}\">\n                <span style=\"{{ c.viewedBadgeStyle }}\">✓ Reviewed<\u002Fspan>\n                <sc-if value=\"{{ c.front }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"padding:20px;height:100%;display:flex;flex-direction:column\">\n                    <span style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#F58220\">{{ c.tag }}<\u002Fspan>\n                    <p style=\"font-size:18px;line-height:1.35;font-weight:700;color:#16161D;margin:12px 0 0\">“{{ c.situation }}”<\u002Fp>\n                    <p style=\"font-size:14.5px;color:#6B655C;margin:10px 0 0\">{{ c.prompt }}<\u002Fp>\n                    <span style=\"margin-top:auto;padding-top:14px;display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:#16161D\">Tap to reveal\n                      <svg width=\"13\" height=\"13\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8h10M9 4l4 4-4 4\" stroke=\"#F58220\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ c.flipped }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding:20px;height:100%;display:flex;flex-direction:column\">\n                    <span style=\"display:inline-flex;align-items:center;gap:7px;font-family:'Oswald',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#3F6B1C\">\n                      <svg width=\"14\" height=\"14\" viewBox=\"0 0 16 16\" fill=\"none\"><circle cx=\"8\" cy=\"8\" r=\"8\" fill=\"#5C8E2E\"><\u002Fcircle><path d=\"M4.5 8.2l2.2 2.2 4.6-4.8\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                      What to do\n                    <\u002Fspan>\n                    <p style=\"font-size:14.5px;line-height:1.55;color:#2D2D33;margin:12px 0 0\">{{ c.answer }}<\u002Fp>\n                    <span style=\"margin-top:auto;padding-top:14px;font-size:12px;font-weight:600;color:#A59E91\">Tap to flip back<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ====================== STEP 8 · FLEET TOOLBOX (contact cards) ====================== -->\n      <sc-if value=\"{{ show8 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"fade\" data-screen-label=\"08 Fleet toolbox\" style=\"max-width:720px;margin:0 auto\">\n          <div style=\"{{ secHeadStyle }}\"><span style=\"{{ secNumStyle }}\">{{ secNum }}<\u002Fspan><div><div style=\"{{ secKickerStyle }}\">Important contacts &amp; resources<\u002Fdiv><h2 style=\"{{ secTitleStyle }}\">Your fleet toolbox<\u002Fh2><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px\">\n            <p style=\"font-size:16px;line-height:1.55;color:#3A3742;margin:0\">Review every card to continue.<\u002Fp>\n            <span style=\"{{ s8counterStyle }}\">{{ s8counterText }}<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:13.5px;line-height:1.5;color:#8A8478;margin:0 0 18px\">Tap a card to see when to use it. Once reviewed, it stays counted.<\u002Fp>\n          <div class=\"grid2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:13px\">\n            <sc-for list=\"{{ s8cards }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <button type=\"button\" onclick=\"{{ c.onClick }}\" style=\"{{ c.cardStyle }}\" style-hover=\"transform:translateY(-2px);border-color:#D6CFC4;box-shadow:0 16px 32px -22px rgba(0,0,0,0.35)\">\n                <div style=\"{{ c.topStyle }}\"><\u002Fdiv>\n                <div style=\"padding:18px 20px\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:18px\">\n                    <span style=\"{{ c.kindStyle }}\">{{ c.kind }}<\u002Fspan>\n                    <span style=\"{{ c.viewedBadgeStyle }}\">✓ Reviewed<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"{{ c.valStyle }}\">{{ c.value }}<\u002Fdiv>\n                  <div style=\"font-size:14px;color:#6B655C;margin-top:3px\">{{ c.label }}<\u002Fdiv>\n                  <div style=\"{{ c.whenWrapStyle }}\"><p style=\"margin:13px 0 0;padding-top:12px;border-top:1px solid #EDE7DE;font-size:14px;line-height:1.55;color:#3A3742\">{{ c.when }}<\u002Fp><\u002Fdiv>\n                  <div style=\"margin-top:12px;font-size:12px;font-weight:600;color:#A59E91\">{{ c.hint }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ====================== STEP 9 · FINAL ASSESSMENT ====================== -->\n      <sc-if value=\"{{ show9 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"fade\" data-screen-label=\"09 Final assessment\" style=\"max-width:720px;margin:0 auto\">\n          <div style=\"{{ secHeadStyle }}\"><span style=\"{{ secNumStyle }}\">{{ secNum }}<\u002Fspan><div><div style=\"{{ secKickerStyle }}\">Final assessment<\u002Fdiv><h2 style=\"{{ secTitleStyle }}\">Put it all together<\u002Fh2><\u002Fdiv><\u002Fdiv>\n\n          <sc-if value=\"{{ s9submitted }}\" hint-placeholder-val=\"{{ false }}\">\n            <div class=\"fade\" style=\"{{ s9resultStyle }}\">\n              <div style=\"{{ s9scoreBadgeStyle }}\">{{ s9score }}<\u002Fdiv>\n              <div style=\"flex:1;min-width:200px\">\n                <div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:24px;letter-spacing:0.01em;text-transform:uppercase\">{{ s9resultTitle }}<\u002Fdiv>\n                <p style=\"margin:6px 0 0;font-size:15px;line-height:1.55;opacity:0.92\">{{ s9resultBody }}<\u002Fp>\n                <button type=\"button\" onclick=\"{{ s9retake }}\" style=\"margin-top:14px;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.3);color:inherit;border-radius:8px;padding:9px 16px;font-size:13.5px;font-weight:600\">Retake assessment<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ s9notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n            <p style=\"font-size:16.5px;line-height:1.6;color:#3A3742;margin:0 0 22px\">Ten real situations. Pick the safest, most appropriate response for each — then submit to see how you did. You'll need 8 out of 10 to pass.<\u002Fp>\n          <\u002Fsc-if>\n\n          <sc-for list=\"{{ s9questions }}\" as=\"q\" hint-placeholder-count=\"10\">\n            <div style=\"background:#fff;border:1px solid #E6DECB;border-radius:14px;padding:20px 22px;margin-bottom:14px\">\n              <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:13px\">\n                <span style=\"{{ q.dotStyle }}\"><\u002Fspan>\n                <span style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#8A8478\">Question {{ q.n }}<\u002Fspan>\n              <\u002Fdiv>\n              <h3 style=\"font-size:18px;line-height:1.4;font-weight:700;margin:0 0 16px;color:#16161D\">{{ q.q }}<\u002Fh3>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <sc-for list=\"{{ q.opts }}\" as=\"o\" hint-placeholder-count=\"4\">\n                  <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\"><span style=\"{{ o.badgeStyle }}\">{{ o.letter }}<\u002Fspan><span style=\"{{ o.labelStyle }}\">{{ o.label }}<\u002Fspan><span style=\"{{ o.markStyle }}\">{{ o.mark }}<\u002Fspan><\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <sc-if value=\"{{ s9notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;align-items:center;gap:16px;margin-top:20px\">\n              <button type=\"button\" onclick=\"{{ s9submit }}\" style=\"{{ s9submitStyle }}\">Submit assessment\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8h10M9 4l4 4-4 4\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n              <span style=\"font-size:13.5px;color:#A59E91;font-weight:600\">{{ s9hint }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ====================== STEP 10 · COMPLETION ====================== -->\n      <sc-if value=\"{{ show10 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"fade\" data-screen-label=\"Completion\" style=\"max-width:780px;margin:0 auto\">\n          <div style=\"background:#16161D;border-radius:20px;overflow:hidden;box-shadow:0 30px 60px -34px rgba(22,22,29,0.6)\">\n            <div style=\"height:14px;background:repeating-linear-gradient(45deg,#86C555 0 16px,#16161D 16px 32px)\"><\u002Fdiv>\n            <div class=\"cover-pad\" style=\"padding:42px 46px 46px;color:#fff;text-align:center\">\n              <span style=\"display:inline-block;font-family:'Oswald',sans-serif;font-weight:500;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#86C555\">Module complete<\u002Fspan>\n              <h1 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:46px;line-height:1;text-transform:uppercase;letter-spacing:0.01em;margin:16px 0 0\">Ready for the road<\u002Fh1>\n              <sc-if value=\"{{ completedShow }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:inline-flex;align-items:center;gap:10px;margin-top:18px;background:#23232C;border:1px solid #34343F;border-radius:999px;padding:9px 18px;font-size:14.5px;font-weight:600\">Assessment score <strong style=\"color:#86C555\">{{ completedScoreText }}<\u002Fstrong><\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;margin-top:18px\">\n            <div style=\"background:#fff;border:1px solid #E6DECB;border-top:4px solid #86C555;border-radius:14px;padding:22px 20px\">\n              <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:30px;color:#E6DECB;line-height:1\">01<\u002Fdiv>\n              <div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;text-transform:uppercase;letter-spacing:0.01em;color:#16161D;margin:8px 0 4px\">Check before you drive<\u002Fdiv>\n              <p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B655C\">Two minutes of pre-drive checks, every trip — and book it in Outlook.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #E6DECB;border-top:4px solid #F58220;border-radius:14px;padding:22px 20px\">\n              <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:30px;color:#E6DECB;line-height:1\">02<\u002Fdiv>\n              <div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;text-transform:uppercase;letter-spacing:0.01em;color:#16161D;margin:8px 0 4px\">Report every issue<\u002Fdiv>\n              <p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B655C\">Damage, warning lights, noises — same day, in Damstra and to the Fleet Team.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #E6DECB;border-top:4px solid #44C7F4;border-radius:14px;padding:22px 20px\">\n              <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:30px;color:#E6DECB;line-height:1\">03<\u002Fdiv>\n              <div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;text-transform:uppercase;letter-spacing:0.01em;color:#16161D;margin:8px 0 4px\">Leave it ready<\u002Fdiv>\n              <p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B655C\">Fuel above ½, clean, logged, booking updated, keys back.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border:1px solid #E6DECB;border-radius:14px;padding:22px 24px;margin-top:13px\">\n            <div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#8A8478;margin-bottom:14px\">Keep these close<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:10px 22px\">\n              <div style=\"min-width:120px\"><div style=\"font-size:12px;color:#8A8478\">Emergency<\u002Fdiv><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:20px;color:#DC382C\">000<\u002Fdiv><\u002Fdiv>\n              <div style=\"min-width:130px\"><div style=\"font-size:12px;color:#8A8478\">Roadside Assist<\u002Fdiv><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:20px;color:#16161D\">1800 257 526<\u002Fdiv><\u002Fdiv>\n              <div style=\"min-width:130px\"><div style=\"font-size:12px;color:#8A8478\">Bookings<\u002Fdiv><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;color:#16161D\">Outlook → Cars<\u002Fdiv><\u002Fdiv>\n              <div style=\"min-width:200px\"><div style=\"font-size:12px;color:#8A8478\">Fleet Team<\u002Fdiv><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:16px;color:#16161D;word-break:break-word\">vehicles@launchhousing.org.au<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin-top:24px\">\n            <button type=\"button\" onclick=\"{{ restart }}\" style=\"display:inline-flex;align-items:center;gap:10px;background:#F58220;color:#16161D;border-radius:11px;padding:14px 26px;font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:0.04em;text-transform:uppercase\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M13 8a5 5 0 1 1-1.5-3.6M13 2v3h-3\" stroke=\"#16161D\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Start over\n            <\u002Fbutton>\n            <span style=\"font-size:13.5px;color:#8A8478\">You can revisit any section from the route menu on the left.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <!-- ===== FOOTER NAV ===== -->\n  <sc-if value=\"{{ footerVisible }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:sticky;bottom:0;z-index:20;background:rgba(233,229,223,0.92);backdrop-filter:blur(8px);border-top:1px solid #D6CFC4\">\n      <div style=\"max-width:1180px;margin:0 auto;padding:13px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px\">\n        <button type=\"button\" onclick=\"{{ back }}\" style=\"display:inline-flex;align-items:center;gap:8px;color:#6B655C;font-weight:600;font-size:14.5px;padding:10px 6px\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M13 8H3M7 4L3 8l4 4\" stroke=\"#6B655C\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Back\n        <\u002Fbutton>\n        <div style=\"display:flex;align-items:center;gap:16px\">\n          <span style=\"{{ hintStyle }}\">{{ hintText }}<\u002Fspan>\n          <button type=\"button\" onclick=\"{{ next }}\" style=\"{{ continueStyle }}\">{{ continueLabel }}\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8h10M9 4l4 4-4 4\" stroke=\"{{ continueArrow }}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    v: 1,\n    step: 0, maxStep: 0,\n    s1: { picked: null },\n    s2: { selected: {}, submitted: false },\n    s3: { scene: 0, picks: {}, done: {} },\n    s4: { stepIdx: 0, picks: {}, done: {} },\n    s5: { picked: null, open: {}, reviewed: {} },\n    s6: { idx: 1, picks: {} },\n    s7: { flipped: {}, viewed: {} },\n    s8: { open: {}, viewed: {} },\n    s9: { answers: {}, submitted: false }\n  };\n\n  SECTIONS = ['Introduction','Before you drive','Looking after the car','Warning lights & upkeep','Fuel, tolls & use','Parking & security','Quick-fire','Fleet toolbox','Final assessment'];\n\n  DATA = {\n    // STEP 1 · Introduction gut-check\n    s1: [\n      { key:'checks', label:'Do the quick pre-drive checks and make sure the trip is booked in Outlook' },\n      { key:'go', label:\"Just go — you're only a few minutes late and it was fine yesterday\" },\n      { key:'later', label:'Drive off and sort the fuel and log sheet later' },\n      { key:'photos', label:'Take photos of the car in case something is wrong' }\n    ],\n    // STEP 2 · Before you drive — pre-drive walk-around (keep=true is part of the routine)\n    s2items:[\n      { key:'tyres', label:'Tyres inflated and undamaged', keep:true },\n      { key:'windscreen', label:'Windscreens clean and crack-free', keep:true },\n      { key:'mirrors', label:'Seat and mirrors adjusted', keep:true },\n      { key:'seatbelts', label:'Seatbelts lock properly', keep:true },\n      { key:'handbrake', label:'Handbrake off before moving', keep:true },\n      { key:'lights', label:'Headlights working', keep:true },\n      { key:'fuel', label:'Fuel above ½ (or fill up first)', keep:true },\n      { key:'warning', label:'No warning lights on the dash', keep:true },\n      { key:'logsheet', label:'Log sheet started (date + odometer)', keep:true },\n      { key:'booking', label:'Trip booked in Outlook', keep:true },\n      { key:'oil', label:'Top up the engine oil', keep:false },\n      { key:'wash', label:'Wash and vacuum the car first', keep:false }\n    ],\n    // STEP 3 · Looking after the car — scenarios\n    scenes: [\n      { tag:'Scene 1 · A mess left behind', scenario:'You get into the fleet car and the last driver has left coffee cups, crumbs and a jumper on the back seat.', q:'What is the right thing to do?',\n        opts:[ {key:'clean',label:'Clear the rubbish, hand in the jumper as lost property, and report any spills to Facilities'}, {key:'ignore',label:\"Leave it — it's the last driver's mess, not yours\"}, {key:'bin',label:'Bin everything, including the jumper, so it is gone'}, {key:'note',label:'Leave a note for the last driver and drive off'} ],\n        correct:'clean',\n        fb:{ title:'Leave it better than you found it.', points:['Every driver hands the car back clean and item-free','Hand in lost property — don\\u2019t bin someone\\u2019s belongings','Report severe spills or stains so Facilities can arrange a deep clean'], email:{label:'Facilities / Fleet Team', value:'vehicles@launchhousing.org.au'} } },\n      { tag:'Scene 2 · The fuel is getting low', scenario:'Halfway through your appointments, the fuel gauge drops just below half.', q:'What should you do?',\n        opts:[ {key:'fill',label:'Fill up at the nearest Ampol using the fuel card'}, {key:'leave',label:\"Leave it — there's still enough to finish today\"}, {key:'next',label:'Let the next driver fill it up'}, {key:'own',label:'Pay with your own card and claim it back later'} ],\n        correct:'fill',\n        fb:{ title:'Fill it before it gets low.', points:['Fill up once the gauge reads below ½ — never leave a car low for the next driver','Use the fuel card on the keyring at an Ampol station','You\\u2019ll enter the odometer reading, then the fleet PIN'] } },\n      { tag:'Scene 3 · An unfamiliar warning light', scenario:'A warning light you don\\u2019t recognise comes on while the car is parked and idling.', q:'What is your first move?',\n        opts:[ {key:'manual',label:'Check the glove-box manual for what the light means'}, {key:'ignore',label:\"Keep driving — it will probably go off\"}, {key:'tow',label:'Call a tow truck straight away'}, {key:'guess',label:'Assume it\\u2019s nothing serious and carry on'} ],\n        correct:'manual',\n        fb:{ title:'Find out what it means first.', points:['Check the manual in the glove box for the warning light','If it\\u2019s serious, don\\u2019t drive — notify the Fleet Team','When in doubt, treat the car as unsafe until you know'], email:{label:'Fleet Team', value:'vehicles@launchhousing.org.au'} } },\n      { tag:'Scene 4 · Fresh damage', scenario:'Loading up, you notice a fresh scratch and a small dent on the rear door. You have no idea how it got there.', q:'What must you do?',\n        opts:[ {key:'report',label:'Report it straight away in Damstra and to the Fleet Team'}, {key:'minor',label:'Skip it — it\\u2019s only a small scratch'}, {key:'pay',label:'Say nothing and quietly offer to pay for it'}, {key:'last',label:'Assume the last driver already reported it'} ],\n        correct:'report',\n        fb:{ title:'Report all damage — every time.', points:['From a small scratch to major damage, report it immediately','Log it in Damstra and email the Fleet Team','You won\\u2019t be asked to pay — Facilities manages the repair and any claim'], email:{label:'Fleet Team', value:'vehicles@launchhousing.org.au'} } }\n    ],\n    // STEP 4 · Warning lights & upkeep — branching steps\n    breakdown:[\n      { tag:'Situation 1 · Tyre pressure warning', scenario:'The tyre-pressure light comes on during a drive. The car still feels okay to drive.', q:'What is the safe move?',\n        opts:[ {key:'check',label:'Pull over safely and check the tyres; reinflate or report if low'}, {key:'ignore',label:'Ignore it while the car still drives fine'}, {key:'reset',label:'Reset the warning light and keep going'}, {key:'speed',label:'Speed up to get back before it gets worse'} ],\n        correct:'check',\n        fb:{ title:'Treat a pressure warning seriously.', points:['It can mean a slow leak or a flat starting','Check the tyres when it\\u2019s safe; report it if you\\u2019re unsure','A used or unsafe spare must be reported too'] } },\n      { tag:'Situation 2 · Engine warning light', scenario:'The engine warning light comes on and the car feels rough and down on power.', q:'What now?',\n        opts:[ {key:'stop',label:'Stop somewhere safe and call Roadside Assist'}, {key:'home',label:'Limp it back to the office'}, {key:'tomorrow',label:'Park it and deal with it tomorrow'}, {key:'battery',label:'Disconnect the battery to clear the light'} ],\n        correct:'stop',\n        fb:{ title:'Rough running plus a light means stop.', points:['Don\\u2019t keep driving a car that feels unsafe','Stop somewhere safe and call Roadside Assist','Notify the Fleet Team so they can arrange next steps'], number:{label:'Roadside Assist', value:'1800 257 526'} } },\n      { tag:'Situation 3 · Windscreen damage', scenario:'A stone on the freeway has left a crack spreading across the driver\\u2019s side of the windscreen.', q:'What do you do?',\n        opts:[ {key:'assess',label:'If it blocks your view or feels unsafe, stop; report it and arrange a repair'}, {key:'tape',label:'Put tape over it and keep using the car'}, {key:'wait',label:'Wait until it spreads further before reporting'}, {key:'wear',label:'Do nothing — chips are normal wear and tear'} ],\n        correct:'assess',\n        fb:{ title:'A crack in your sightline is unsafe.', points:['Damage in your line of sight can make the car unroadworthy','Report it and contact the Fleet Team to arrange a repair','Don\\u2019t send the car back out with vision-blocking damage'], email:{label:'Fleet Team', value:'vehicles@launchhousing.org.au'} } },\n      { tag:'Situation 4 · An unusual noise', scenario:'There\\u2019s a new grinding noise from the front wheels every time you brake.', q:'What is the right step?',\n        opts:[ {key:'report',label:'Report the noise to the Fleet Team, and stop driving if it feels unsafe'}, {key:'radio',label:'Turn up the radio so it\\u2019s less distracting'}, {key:'service',label:'Wait for the annual service to mention it'}, {key:'normal',label:'Assume it\\u2019s normal and keep driving'} ],\n        correct:'report',\n        fb:{ title:'Noises and vibrations get reported.', points:['Unusual sounds, vibrations or smells are never ignored','Email the Fleet Team with what you\\u2019re noticing','If it feels unsafe, stop and call Roadside Assist'] } }\n    ],\n    // STEP 5 · Fuel, tolls & use — decision + accordion\n    s5:{\n      scenario:\"You're running late between appointments. The fuel is just under half, your quickest route crosses a tolled bridge, and a colleague has asked to borrow the car this afternoon.\",\n      q:'Which of these is the right call?',\n      opts:[\n        { key:'right', label:'Fill up at an Ampol, take the toll route for work, and have your colleague update the Outlook booking' },\n        { key:'skip', label:'Skip fuel to save time and leave it for your colleague to fill' },\n        { key:'detour', label:'Take a quick personal detour to the shops while you\\u2019re out' },\n        { key:'swap', label:'Hand the keys over without changing the booking' }\n      ],\n      correct:'right',\n      accordion:[\n        { h:'When to fill up', b:'Fill the tank once the gauge reads below ½ full. Never leave a car low or empty for the next driver.' },\n        { h:'Find an Ampol', b:'Fleet fuel cards are used at Ampol stations. The card is attached to the keyring.' },\n        { h:'Record the odometer', b:'Before you pay, note the odometer reading (total km the car has travelled) — take a photo or write it down.' },\n        { h:'At the terminal', b:'The fuel-card terminal asks for the odometer reading first, then a PIN. Enter the odometer you just recorded.' },\n        { h:'Enter the fleet PIN', b:'Enter the shared fleet PIN kept with the card. Keep it within Launch — never share it outside the team.' },\n        { h:'Tolls & personal use', b:'Work tolls are covered. The car is for work — no personal errands, and any overnight garaging needs written manager approval.' }\n      ]\n    },\n    // STEP 6 · Parking & security — conversation\n    convo:[\n      { who:'mgr', text:\"Before you head off \\u2014 where are you thinking of parking at the client\\u2019s place?\" },\n      { who:'you', choices:[\"Out front, in their driveway\",\"On the street, facing my exit\"] },\n      { who:'mgr', text:\"On the street is the one. Never block a client\\u2019s driveway, and park so you can pull straight out into traffic rather than reverse into it.\" },\n      { who:'you', choices:[\"Got it. What about the keys?\",\"Anything else on parking?\"] },\n      { who:'mgr', text:\"Mind the key\\u2019s default unlock setting \\u2014 set it so only the driver\\u2019s door opens. That way a client can\\u2019t get into the car while you\\u2019re walking around to your seat.\" },\n      { who:'mgr', text:\"And nothing valuable on show. Bags, laptops, anything personal \\u2014 take it with you or lock it in the boot, out of sight.\" },\n      { who:'you', choices:[\"Makes sense. I might need it overnight though\",\"All clear, thanks\"] },\n      { who:'mgr', text:\"If you ever need to garage it overnight, get written approval from your Group Manager first \\u2014 there\\u2019s a tax side the People Team has to sort. Don\\u2019t just take it home. Drive safe out there.\" }\n    ],\n    // STEP 7 · Quick-fire\n    quickfire:[\n      { tag:'Quick fire 01', situation:'The fuel light comes on mid-trip.', prompt:'What do you do?', answer:'Fill up at the nearest Ampol with the fuel card before it drops lower \\u2014 and never hand the car back below ½. Record the odometer, then enter the fleet PIN.' },\n      { tag:'Quick fire 02', situation:'A tyre looks low when you walk up to the car.', prompt:'Do you drive?', answer:'No. Check it properly, reinflate if you can, and report it to the Fleet Team. A car that isn\\u2019t safe doesn\\u2019t go out.' },\n      { tag:'Quick fire 03', situation:'You spot a small windscreen chip.', prompt:'What\\u2019s the next step?', answer:'Report it \\u2014 chips spread. Contact the Fleet Team to arrange a repair before the chip becomes a crack in your line of sight.' },\n      { tag:'Quick fire 04', situation:'The car smells unusual \\u2014 burning or fuel.', prompt:'How do you respond?', answer:'Treat it as a warning. Stop somewhere safe, don\\u2019t keep driving, and call Roadside Assist. Then report it to the Fleet Team.' },\n      { tag:'Quick fire 05', situation:'A service reminder appears on the dash.', prompt:'Who books it in?', answer:'Not you. Let the Fleet / Facilities Team know \\u2014 they schedule servicing and tyres and will arrange it.' },\n      { tag:'Quick fire 06', situation:'You\\u2019re about to hand the car back, but it\\u2019s untidy.', prompt:'What finishes the trip?', answer:'Clear your rubbish and belongings from the front, back and boot, complete and email the log sheet, return the keys, and update your Outlook booking.' }\n    ],\n    // STEP 8 · Fleet toolbox\n    contacts:[\n      { key:'fleet', value:'vehicles@launchhousing.org.au', label:'Fleet Team', when:'Report any damage, warning light, unusual noise, used spare or stolen vehicle \\u2014 and for anything else vehicle-related.', tone:'#1F8A8A', kind:'Email', big:false },\n      { key:'road', value:'1800 257 526', label:'Roadside Assist', when:'Breakdowns, flat batteries, flat tyres and lockouts \\u2014 your first call when the car won\\u2019t go or feels unsafe.', tone:'#F58220', kind:'Roadside', big:true },\n      { key:'book', value:'Outlook → Cars', label:'Vehicle Bookings', when:'Book every trip in Outlook (Room Finder → Cars) and update it whenever your times change or someone else drives.', tone:'#2A6FB0', kind:'Booking', big:false },\n      { key:'maint', value:'Facilities Team', label:'Maintenance & Cleaning', when:'Servicing, tyres, cleaning and permits are scheduled by Facilities. Flag spills, stains or anything that needs attention.', tone:'#7A5AA6', kind:'Support', big:false }\n    ],\n    // STEP 9 · Final assessment (correct key listed first; positions are shuffled at render)\n    assessment:[\n      { q:'Before you drive a fleet car, you must\\u2026', correct:'a', opts:[{key:'a',label:'Do the pre-drive checks and make sure the trip is booked in Outlook'},{key:'b',label:'Just check the fuel and get going'},{key:'c',label:'Only check the car if you\\u2019re transporting a client'},{key:'d',label:'Trust that yesterday\\u2019s driver did the checks'}] },\n      { q:'The fuel gauge drops just below half during your trips. You should\\u2026', correct:'a', opts:[{key:'a',label:'Fill up at an Ampol using the fuel card'},{key:'b',label:'Leave it for the next driver to fill'},{key:'c',label:'Finish the day and fill it tomorrow'},{key:'d',label:'Only fill up once the fuel light comes on'}] },\n      { q:'You notice a small fresh scratch on the fleet car. The right
