eetSCORM.finish(done); } }catch(e){} };\n    window.addEventListener('pagehide', this._onUnload);\n    window.addEventListener('beforeunload', this._onUnload);\n  }\n  componentWillUnmount(){ if(this._onUnload){ window.removeEventListener('pagehide', this._onUnload); window.removeEventListener('beforeunload', this._onUnload); } clearTimeout(this._scormT); }\n  componentDidUpdate(){\n    try{ localStorage.setItem('fleetModule2V1', JSON.stringify(this.state)); }catch(e){}\n    // Throttled bookmark + suspend commit to the LMS\n    try{\n      if(window.FleetSCORM && window.FleetSCORM.connected){\n        clearTimeout(this._scormT);\n        this._scormT = setTimeout(()=>{ try{ window.FleetSCORM.save(String(this.state.step), JSON.stringify(this.state)); }catch(e){} }, 600);\n      }\n    }catch(e){}\n  }\n\n  // ---------- nav ----------\n  begin(){ this.go(1); }\n  go(n){ if(n<0||n>10) return; this.setState(s=>({ step:n, maxStep:Math.max(s.maxStep,n) })); window.scrollTo(0,0); }\n  next(){ if(!this.canContinue()) return; this.go(this.state.step+1); }\n  back(){ this.go(this.state.step-1); }\n  freshState(){ return { v:1, step:0, maxStep:0,\n    s1:{ picked:null },\n    s2:{ selected:{}, submitted:false },\n    s3:{ scene:0, picks:{}, done:{} },\n    s4:{ stepIdx:0, picks:{}, done:{} },\n    s5:{ picked:null, open:{}, reviewed:{} },\n    s6:{ idx:1, picks:{} },\n    s7:{ flipped:{}, viewed:{} },\n    s8:{ open:{}, viewed:{} },\n    s9:{ answers:{}, submitted:false } }; }\n  restart(){\n    // Clear every saved selection so the learner truly starts fresh\n    try{ localStorage.removeItem('fleetModule2V1'); }catch(e){}\n    try{ if(window.FleetSCORM && window.FleetSCORM.connected){ window.FleetSCORM.setSuspend(''); window.FleetSCORM.setIncomplete(); window.FleetSCORM.setBookmark('0'); window.FleetSCORM.commit(); } }catch(e){}\n    this.setState(this.freshState());\n    window.scrollTo(0,0);\n  }\n\n  // ---------- STEP 1 · gut-check ----------\n  pickS1(key){ if(this.state.s1.picked) return; this.setState(s=>({ s1:{ picked:key } })); }\n\n  // ---------- STEP 2 · walk-around multi-select ----------\n  toggleS2(key){ if(this.state.s2.submitted) return; this.setState(s=>({ s2:{ ...s.s2, selected:{ ...s.s2.selected, [key]:!s.s2.selected[key] } } })); }\n  submitS2(){ const n=this.DATA.s2items.filter(it=>this.state.s2.selected[it.key]).length; if(n===0) return; this.setState(s=>({ s2:{ ...s.s2, submitted:true } })); window.scrollTo(0,0); }\n  resetS2(){ this.setState(s=>({ s2:{ selected:{}, submitted:false } })); }\n\n  // ---------- STEP 3 · scenarios ----------\n  pickS3(key){ const sc=this.state.s3.scene; if(this.state.s3.done[sc]) return; this.setState(s=>({ s3:{ ...s.s3, picks:{...s.s3.picks,[sc]:key}, done:{...s.s3.done,[sc]:true} } })); }\n  nextScene(){ this.setState(s=>({ s3:{ ...s.s3, scene:Math.min(3, s.s3.scene+1) } })); }\n\n  // ---------- STEP 4 · branching ----------\n  pickS4(key){ const i=this.state.s4.stepIdx; if(this.state.s4.done[i]) return; const correct=this.DATA.breakdown[i].correct;\n    this.setState(s=>({ s4:{ ...s.s4, picks:{ ...s.s4.picks, [i]:key }, done: key===correct ? { ...s.s4.done, [i]:true } : s.s4.done } })); }\n  nextS4(){ this.setState(s=>({ s4:{ ...s.s4, stepIdx:Math.min(3, s.s4.stepIdx+1) } })); }\n\n  // ---------- STEP 5 · decision + accordion ----------\n  pickS5(key){ if(this.state.s5.picked) return; this.setState(s=>({ s5:{ ...s.s5, picked:key } })); }\n  toggleS5(i){ this.setState(s=>({ s5:{ ...s.s5, open:{ ...s.s5.open, [i]:!s.s5.open[i] }, reviewed:{ ...s.s5.reviewed, [i]:true } } })); }\n\n  // ---------- STEP 6 · conversation ----------\n  advanceS6(choiceLabel){ const conv=this.DATA.convo; const i=this.state.s6.idx; if(i>=conv.length) return; const node=conv[i];\n    this.setState(s=>{ const picks={...s.s6.picks}; if(node.who==='you' && choiceLabel!=null) picks[i]=choiceLabel; return { s6:{ idx:i+1, picks } }; }); }\n\n  // ---------- STEP 7 / 8 · review cards ----------\n  flipS7(i){ this.setState(s=>({ s7:{ flipped:{ ...s.s7.flipped, [i]:!s.s7.flipped[i] }, viewed:{ ...s.s7.viewed, [i]:true } } })); }\n  viewS8(i){ this.setState(s=>({ s8:{ open:{ ...s.s8.open, [i]:!s.s8.open[i] }, viewed:{ ...s.s8.viewed, [i]:true } } })); }\n\n  // ---------- STEP 9 · assessment ----------\n  pickS9(qi,key){ if(this.state.s9.submitted) return; this.setState(s=>({ s9:{ ...s.s9, answers:{ ...s.s9.answers, [qi]:key } } })); }\n  submitS9(){ const a=this.state.s9.answers; const total=this.DATA.assessment.length; if(Object.keys(a).length < total) return; this.setState(s=>({ s9:{ ...s.s9, submitted:true } }));\n    const sc=this.scoreS9();\n    try{ if(window.FleetSCORM && window.FleetSCORM.connected) window.FleetSCORM.setPassFail(sc, 0, total, sc>=8); }catch(e){}\n    window.scrollTo(0,0); }\n  retakeS9(){ this.setState(s=>({ s9:{ answers:{}, submitted:false } })); window.scrollTo(0,0); }\n  scoreS9(){ return this.DATA.assessment.reduce((n,q,i)=> n + (this.state.s9.answers[i]===q.correct ? 1 : 0), 0); }\n\n  // ---------- option renderer ----------\n  optStyle(state){\n    const style = { display:'flex', alignItems:'center', gap:'13px', width:'100%', textAlign:'left',\n      padding:'15px 17px', borderRadius:'10px', border:'1.5px solid #E6DECB', borderLeft:'5px solid #16161D',\n      background:'#fff', color:'#16161D', cursor:'pointer', transition:'border-color .12s, background .12s, opacity .12s' };\n    const badge = { flex:'none', width:'30px', height:'30px', borderRadius:'8px', display:'grid', placeItems:'center',\n      font:\"700 15px/1 'Oswald',sans-serif\", background:'#16161D', color:'#F58220' };\n    const label = { flex:'1', font:\"500 16px/1.35 'DM Sans',Arial,sans-serif\", color:'inherit' };\n    const mark = { flex:'none', fontWeight:'800', fontSize:'18px', opacity:0, color:'transparent' };\n    let m='';\n    if(state==='selected'){ style.border='2px solid #F58220'; style.borderLeft='5px solid #F58220'; style.background='#FFF4E9'; badge.background='#F58220'; badge.color='#16161D'; }\n    else if(state==='correct'){ style.border='2px solid #6FAE3D'; style.borderLeft='5px solid #6FAE3D'; style.background='#EDF5E1'; badge.background='#6FAE3D'; badge.color='#fff'; mark.color='#436E1C'; mark.opacity=1; m='✓'; style.cursor='default'; }\n    else if(state==='wrong'){ style.border='2px solid #E6841B'; style.borderLeft='5px solid #E6841B'; style.background='#FDEEDD'; badge.background='#F58220'; badge.color='#fff'; mark.color='#C25E0E'; mark.opacity=1; m='✗'; style.cursor='default'; }\n    else if(state==='muted'){ style.opacity=0.45; style.cursor='default'; }\n    return { style, badgeStyle:badge, labelStyle:label, markStyle:mark, mark:m };\n  }\n\n  reorderCorrect(opts, correct, targetIdx){\n    const arr = opts.slice();\n    const from = arr.findIndex(o=>o.key===correct);\n    if(from<0) return arr;\n    const t = Math.max(0, Math.min(arr.length-1, targetIdx));\n    const [item] = arr.splice(from,1);\n    arr.splice(t,0,item);\n    return arr;\n  }\n\n  mcq(opts, picked, correct, reveal, onPick){\n    return opts.map((o,i)=>{\n      let st='idle';\n      if(picked){\n        if(reveal===true){ st = (o.key===correct) ? 'correct' : (o.key===picked ? 'wrong' : 'muted'); }\n        else if(reveal==='branch'){ st = (picked===correct) ? ((o.key===correct)?'correct':'muted') : ((o.key===picked)?'wrong':'idle'); }\n        else { st = (o.key===picked) ? 'selected' : 'idle'; }\n      }\n      const s = this.optStyle(st);\n      return { key:o.key, letter:'ABCD'[i], label:o.label, onClick:()=>onPick(o.key), ...s };\n    });\n  }\n\n  fbPanel(right, title){\n    const accent = right ? '#6FAE3D' : '#E6841B';\n    const bg = right ? '#EDF5E1' : '#FDEEDD';\n    const bord = right ? '#CBE2AE' : '#F4CDA1';\n    const tc = right ? '#3F6B1C' : '#A8520B';\n    return {\n      panelStyle:{ marginTop:'22px', padding:'20px 22px', borderRadius:'14px', background:bg, border:'1px solid '+bord, borderLeft:'5px solid '+accent },\n      titleStyle:{ margin:'0 0 8px', fontFamily:\"'Oswald',sans-serif\", fontWeight:'600', fontSize:'19px', color:tc, letterSpacing:'0.01em' }\n    };\n  }\n\n  // ---------- gating ----------\n  canContinue(){\n    const s=this.state;\n    switch(s.step){\n      case 0: return true;\n      case 1: return !!s.s1.picked;\n      case 2: return !!s.s2.submitted;\n      case 3: return !!s.s3.done[3];\n      case 4: return !!s.s4.done[3];\n      case 5: return !!s.s5.picked && this.DATA.s5.accordion.every((a,i)=>s.s5.reviewed[i]);\n      case 6: return s.s6.idx >= this.DATA.convo.length;\n      case 7: return this.DATA.quickfire.every((c,i)=>s.s7.viewed[i]);\n      case 8: return this.DATA.contacts.every((c,i)=>s.s8.viewed[i]);\n      case 9: return !!s.s9.submitted;\n      default: return true;\n    }\n  }\n\n  gateHint(step){\n    const s=this.state;\n    switch(step){\n      case 2: return 'Check your walk-around to continue';\n      case 5: if(!s.s5.picked) return 'Answer to continue'; return 'Review all fuel-card steps to continue';\n      case 6: return 'Work through the conversation to continue';\n      case 7: return 'Reveal all cards to continue';\n      case 8: return 'Review all contacts to continue';\n      case 9: return 'Submit the assessment to finish';\n      default: return 'Answer to continue';\n    }\n  }\n\n  headStyles(){\n    return {\n      secHeadStyle:{ display:'flex', alignItems:'center', gap:'16px', marginBottom:'26px' },\n      secNumStyle:{ flex:'none', width:'52px', height:'58px', background:'#F58220', color:'#16161D', borderRadius:'8px 8px 18px 18px', display:'grid', placeItems:'center', font:\"700 22px/1 'Oswald',sans-serif\" },\n      secKickerStyle:{ fontFamily:\"'Oswald',sans-serif\", fontWeight:'500', fontSize:'12.5px', letterSpacing:'0.12em', textTransform:'uppercase', color:'#8A8478', marginBottom:'3px' },\n      secTitleStyle:{ fontFamily:\"'Oswald',sans-serif\", fontWeight:'600', fontSize:'30px', lineHeight:'1.04', letterSpacing:'0.005em', text
